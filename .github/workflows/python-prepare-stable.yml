# Reusable workflow: strip the -beta suffix from the version file and CHANGELOG.md
# on develop, so that main receives the correct stable version after merge.
#
# Call from another repository:
#
#   jobs:
#     prepare-stable-version:
#       if: >
#         github.event.review.state == 'approved' &&
#         github.event.pull_request.base.ref == 'main' &&
#         github.event.pull_request.head.ref == 'develop'
#       uses: Carmenda-nl/carmenda-workflows/.github/workflows/python-prepare-stable.yml@main
#       with:
#         version-file: app/main/_version.py

name: Prepare stable version

on:
  workflow_call:
    inputs:
      version-file:
        description: Path of the version file
        type: string
        default: app/main/_version.py

jobs:
  prepare-stable-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v7.0.0
        with:
          ref: develop
          fetch-depth: 0

      - name: Determine stable version
        id: version
        run: |
          VERSION=$(cat ${{ inputs.version-file }} | grep -oP "(?<=').*(?=')")
          STABLE="${VERSION%-beta}"
          echo "stable=$STABLE" >> $GITHUB_OUTPUT
          echo "stable_no_v=${STABLE#v}" >> $GITHUB_OUTPUT

      - name: Update version file to stable
        run: |
          echo "__version__ = '${{ steps.version.outputs.stable }}'" > ${{ inputs.version-file }}

      - name: Strip -beta and refresh date in CHANGELOG.md
        run: |
          VERSION_NO_V="${{ steps.version.outputs.stable_no_v }}"
          TODAY=$(date +%Y-%m-%d)
          sed -i -E "s/^## \[${VERSION_NO_V}-beta\] - .*/## [${VERSION_NO_V}] - ${TODAY}/" CHANGELOG.md

      - name: Commit stable version and CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.version-file }} CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(release): bump version to ${{ steps.version.outputs.stable }}"
          git push origin develop
