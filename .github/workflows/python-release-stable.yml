# Reusable workflow: promote the latest beta release to a stable release.
# Downloads the beta assets, renames them, creates a new stable release.
#
# Call from another repository:
#
#   jobs:
#     promote-beta-to-stable:
#       if: >
#         github.event.pull_request.merged == true &&
#         github.event.pull_request.base.ref == 'main' &&
#         github.event.pull_request.head.ref == 'develop'
#       uses: Carmenda-nl/carmenda-workflows/.github/workflows/python-release-stable.yml@main
#       secrets: inherit

name: Promote Beta to Stable release

on:
  workflow_call:

jobs:
  promote-beta-to-stable:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Determine beta tag to promote
        id: determine_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BETA_TAG=$(gh api repos/${{ github.repository }}/releases --jq '[.[] | select(.prerelease==true and (.tag_name | contains("-beta")))] | sort_by(.created_at) | last | .tag_name')

          if [ -z "$BETA_TAG" ] || [ "$BETA_TAG" = "null" ]; then
            echo "::error::No beta release found to promote"
            exit 1
          fi

          STABLE_TAG="${BETA_TAG%-beta}"
          echo "beta_tag=$BETA_TAG" >> $GITHUB_OUTPUT
          echo "stable_tag=$STABLE_TAG" >> $GITHUB_OUTPUT
          echo "Will promote $BETA_TAG → $STABLE_TAG"

      - name: Remove beta tag locally for release notes generation
        run: git tag -d "${{ steps.determine_tag.outputs.beta_tag }}" || true

      - name: Get release notes
        id: release_notes
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff.toml
          args: --tag ${{ steps.determine_tag.outputs.stable_tag }} --unreleased --strip header
        env:
          OUTPUT: release_notes.md

      - name: Download beta release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          cd assets
          gh release download "${{ steps.determine_tag.outputs.beta_tag }}" -R ${{ github.repository }}

          for file in *-beta.zip; do
            if [ -f "$file" ]; then
              newname="${file//-beta.zip/.zip}"
              mv "$file" "$newname"
              echo "Renamed: $file → $newname"
            fi
          done

          ls -lh

      - name: Create stable release from beta
        id: create_stable_from_beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd assets
          gh release create "${{ steps.determine_tag.outputs.stable_tag }}" \
            --title "Release ${{ steps.determine_tag.outputs.stable_tag }}" \
            --notes-file ../release_notes.md \
            --repo ${{ github.repository }} \
            *.zip
          echo "Created stable release from beta"
          echo "success=true" >> $GITHUB_OUTPUT

      - name: Delete beta release and tag
        if: steps.create_stable_from_beta.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.determine_tag.outputs.beta_tag }}" -R ${{ github.repository }} --yes
          echo "Deleted beta release"

          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/${{ steps.determine_tag.outputs.beta_tag }}" || echo "Tag already deleted"
          echo "Deleted beta tag"

          echo "Promotion complete: ${{ steps.determine_tag.outputs.beta_tag }} → ${{ steps.determine_tag.outputs.stable_tag }}"

      - name: Update CHANGELOG.md
        if: steps.create_stable_from_beta.outputs.success == 'true'
        run: |
          python3 << 'EOF'
          import re
          stable_ver = '${{ steps.determine_tag.outputs.stable_tag }}'.lstrip('v')
          beta_ver = '${{ steps.determine_tag.outputs.beta_tag }}'.lstrip('v')
          with open('release_notes.md', 'r') as f:
              new_entry = f.read().strip()
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          for ver in [stable_ver, beta_ver]:
              if ver:
                  pattern = r'## \[' + re.escape(ver) + r'\].*?(?=\n## \[|\Z)'
                  content = re.sub(pattern, '', content, flags=re.DOTALL)
          match = re.search(r'\n(## \[)', content)
          if match:
              pos = match.start() + 1
              content = content[:pos] + new_entry + '\n\n' + content[pos:]
          else:
              content = content.rstrip() + '\n\n' + new_entry + '\n'
          content = re.sub(r'\n{3,}', '\n\n', content)
          with open('CHANGELOG.md', 'w') as f:
              f.write(content)
          EOF

      - name: Commit CHANGELOG.md
        if: steps.create_stable_from_beta.outputs.success == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(release): update CHANGELOG.md for ${{ steps.determine_tag.outputs.stable_tag }}"
          git push origin HEAD:develop
          git push origin HEAD:main
