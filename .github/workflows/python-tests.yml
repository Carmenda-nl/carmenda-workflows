# Reusable workflow: lint, type check and test a Python (uv) project.
# A coverage report will be uploaded as an artifact after tests run.
#
# Call from another repository:
#
#   jobs:
#     tests:
#       uses: Carmenda-nl/workflows/.github/workflows/python-tests.yml@main
#       with:
#         working-directory: app

name: Python tests

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the Python project (pyproject.toml)
        type: string
        default: app
      pre-test-command:
        description: "Optional command to run before pytest (e.g. Django migrations)"
        type: string
        default: ""

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Require .python-version file
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ ! -f .python-version ]; then
            echo "::error::Missing .python-version in '${{ inputs.working-directory }}'."
            exit 1
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: uv sync --group dev

      - name: Run Ruff linting
        working-directory: ${{ inputs.working-directory }}
        run: uv run ruff check .

      - name: Run Ruff formatting check
        working-directory: ${{ inputs.working-directory }}
        run: uv run ruff format --check .

      - name: Run Mypy type checking
        working-directory: ${{ inputs.working-directory }}
        run: uv run mypy .

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
            **/.python-version
          working-directory: ${{ inputs.working-directory }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: uv sync --group dev

      - name: Run pre-test command
        if: inputs.pre-test-command != ''
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.pre-test-command }}
        env:
          DEBUG: "False"

      - name: Run pytest
        working-directory: ${{ inputs.working-directory }}
        run: uv run pytest -s -v
        env:
          DEBUG: "False"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: coverage-reports
          path: |
            ${{ inputs.working-directory }}/pytest/html/
            ${{ inputs.working-directory }}/pytest/coverage.xml
